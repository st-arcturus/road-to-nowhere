<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover">
<meta name="theme-color" content="#323232">
<title>Road to Nowhere</title>
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="/fonts/fonts.css">
<link rel="stylesheet" href="/common/client.css">
<link rel="stylesheet" href="play.css">
<script defer src="/common/client.js"></script>
<script defer src="play.js"></script>
</head>
<body>

<header>
  <div id="toolbar">
    <details>
      <summary><img src="/images/cog.svg"></summary>
      <menu>
        <li><a href="info/rules.html" target="_blank">Rules</a>
        <li class="separator">
      </menu>
    </details>
    <div id="round-lbl" class="round-lbl"></div>
    <div id="phase-badge" class="phase-badge">—</div>
  </div>
</header>

<div class="lpanel">
  <div class="psec">
    <div class="plbl">Players</div>
    <div id="pl-list"></div>
  </div>
  <div class="psec">
    <div class="plbl">Companies</div>
    <div id="co-list"></div>
  </div>
</div>

<main data-min-zoom="0.5" data-max-zoom="2.0">
  <svg id="map"></svg>
</main>

<aside>
  <div id="roles"></div>
  <div class="psec">
    <div class="plbl">Turn Order</div>
    <div id="ttrack" class="ttrack"></div>
  </div>
  <div class="psec">
    <div class="plbl">Active Box</div>
    <div id="abox" class="abox"></div>
  </div>
  <div id="log"></div>
</aside>

<footer id="status"></footer>

<div class="tooltip" id="tt"></div>

<div id="scorecard" class="scorecard" style="display:none">
  <div class="scorecard-header" id="scorecard-header">
    <div class="scoretitle">FINAL SCORES</div>
    <div class="score-btns">
      <button class="score-btn" id="score-minimize">—</button>
    </div>
  </div>
  <div class="scorecard-body">
    <div id="scorerows"></div>
  </div>
</div>

</body>
</html>
