<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to Nowhere</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#323232; --bg2:#3c3c3c; --bg3:#464646; --surface:#505050;
  --border:#626262; --text:#e8e4d8; --muted:#7a7660;
  --accent:#c8a84b; --accent2:#8fb3c8;
  --font-d:'Bebas Neue',sans-serif; --font-m:'DM Mono',monospace; --font-b:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}

.setup{background:var(--bg2);border:1px solid var(--border);padding:40px 48px;text-align:center;max-width:400px;width:100%;}
.setup h1{font-family:var(--font-d);font-size:42px;letter-spacing:.12em;color:var(--accent);margin-bottom:4px;}
.setup .sub{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:.15em;margin-bottom:32px;}
.field{margin-bottom:18px;text-align:left;}
.field label{display:block;font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;}
select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:14px;padding:8px 12px;border-radius:2px;appearance:none;}
.btn-start{width:100%;padding:12px;background:var(--accent);border:none;color:var(--bg);font-family:var(--font-d);font-size:20px;letter-spacing:.1em;cursor:pointer;border-radius:2px;margin-top:6px;}
.btn-start:hover{background:#d4b558;}
.note{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.6;}

#game{display:none;flex-direction:column;width:100%;height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.title{font-family:var(--font-d);font-size:20px;letter-spacing:.12em;color:var(--accent);}
.phase-badge{font-family:var(--font-m);font-size:10px;background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:2px;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
.round-lbl{font-family:var(--font-m);font-size:10px;color:var(--muted);white-space:nowrap;}
.switcher-wrap{display:flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:10px;color:var(--muted);white-space:nowrap;}
#player-switcher{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:11px;padding:2px 6px;border-radius:2px;width:auto;}
.main{display:flex;flex:1;overflow:hidden;}

.lpanel,.rpanel{width:196px;flex-shrink:0;background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;}
.lpanel{border-right:1px solid var(--border);}
.rpanel{border-left:1px solid var(--border);}
.cpanel{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:10px;}
.psec{padding:9px 11px;border-bottom:1px solid var(--border);}
.plbl{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:5px;}

.co-card{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--bg3);}
.co-card:last-child{border-bottom:none;}
.co-card.inactive{opacity:.3;}
.co-dot{width:10px;height:10px;border-radius:0;flex-shrink:0;}
.co-nm{font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.co-stats{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.co-primary{display:flex;gap:6px;align-items:baseline;}
.co-val{font-family:var(--font-m);font-size:11px;color:var(--accent);font-weight:500;}
.co-treas{font-family:var(--font-m);font-size:11px;color:#8fb3c8;}
.co-claimval{font-family:var(--font-m);font-size:9px;color:#b08060;}
.co-claims-val{font-family:var(--font-m);font-size:11px;color:#b08060;}
.co-secondary{display:flex;gap:6px;font-family:var(--font-m);font-size:9px;color:var(--muted);}
.co-lbl{font-size:8px;color:var(--muted);opacity:.6;}
.co-claims-row{display:flex;gap:3px;flex-wrap:wrap;min-height:0;margin-top:3px;}
.claim-counter{display:flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:50%;font-family:var(--font-m);font-size:10px;font-weight:500;color:#0a0a08;}

.ttrack{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
.ttrack-row{display:flex;gap:3px;}
.tslot{flex:1;min-width:0;border:1px solid var(--border);border-radius:2px;padding:2px 3px;text-align:center;}
.tslot.empty{border-color:var(--bg3);opacity:.4;}
.tpos{font-family:var(--font-m);font-size:7px;color:var(--muted);margin-bottom:1px;}
.tplayer-badge{font-size:9px;border-radius:2px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent;}
.tcube-bot{width:100%;height:10px;border-radius:0;margin-top:2px;}
.trow-lbl{font-family:var(--font-m);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1px;}

.abox{display:flex;gap:3px;flex-wrap:wrap;min-height:18px;border:1px solid var(--border);border-radius:3px;padding:3px;margin-top:4px;}
.acube{width:13px;height:13px;border-radius:0;}

.logarea{padding:7px 11px;max-height:170px;overflow-y:auto;flex:1;}
.logentry{font-family:var(--font-m);font-size:9px;line-height:1.6;color:var(--muted);border-bottom:1px solid var(--bg3);padding:1px 0;}
.logentry.hi{color:var(--text);}

.plcard{padding:5px 0;border-bottom:1px solid var(--bg3);}
.plcard:last-child{border-bottom:none;}
.plhdr{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.plpos{font-family:var(--font-m);font-size:9px;color:var(--muted);width:16px;}
.pldot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.plnm{font-size:11px;font-weight:500;flex:1;}
.plcash{font-family:var(--font-m);font-size:11px;color:var(--accent);}
.pl-bid{font-family:var(--font-m);font-size:9px;color:var(--muted);margin-left:auto;}
.pl-meta{display:flex;gap:8px;margin-left:20px;margin-bottom:2px;}
.pl-claims{font-family:var(--font-m);font-size:9px;color:var(--muted);}
.pips{display:flex;gap:3px;flex-wrap:wrap;margin-left:20px;}
.pip-counter{display:flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:0;font-family:var(--font-m);font-size:10px;font-weight:500;color:#0a0a08;}

.actarea{padding:9px 11px;flex:1;}
.actlbl{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:6px;}
.actmsg{font-size:11px;color:var(--text);line-height:1.5;margin-bottom:8px;min-height:30px;}
.btn{display:block;width:100%;padding:7px 10px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:11px;cursor:pointer;text-align:left;transition:background .1s,border-color .1s;}
.btn:hover{background:var(--bg3);border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500;}
.btn.primary:hover{background:#d4b558;color:var(--bg);}
.btn.danger{border-color:#6b3030;color:#c06060;}
.btn.danger:hover{background:#2a1818;border-color:#c06060;color:#e08080;}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none;}

.bid-widget{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.bid-row{display:flex;align-items:center;gap:6px;}
.bid-counter{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:3px 6px;}
.bid-counter button{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:0 3px;line-height:1;}
.bid-counter button:hover{color:#d4b558;}
.bid-counter button:disabled{opacity:.3;cursor:default;}
.bid-val{font-family:var(--font-m);font-size:14px;color:var(--text);min-width:32px;text-align:center;}
.bid-hint{font-family:var(--font-m);font-size:9px;color:var(--muted);}

.buy-grid{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.buy-btn{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:0;}
.buy-dot{width:10px;height:10px;border-radius:0;flex-shrink:0;}

.draft-grid{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.draft-btn{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:0;}
.draft-dot{width:10px;height:10px;border-radius:0;flex-shrink:0;}

.maphint{font-size:9px;color:var(--muted);margin-top:6px;font-family:var(--font-m);}

.tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border);padding:4px 8px;font-family:var(--font-m);font-size:10px;pointer-events:none;z-index:50;display:none;color:var(--text);border-radius:2px;}

.scorecard{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--accent);min-width:300px;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5);}
.scorecard-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--accent);cursor:move;user-select:none;}
.scoretitle{font-family:var(--font-d);font-size:22px;letter-spacing:.1em;color:var(--accent);}
.score-btns{display:flex;gap:6px;}
.score-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 7px;cursor:pointer;font-family:var(--font-m);}
.score-btn:hover{border-color:var(--accent);color:var(--accent);}
.scorecard-body{padding:12px 20px;}
.scorecard.minimized .scorecard-body{display:none;}
.scorerow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--font-m);font-size:12px;}
.scorerow.winner{font-size:14px;color:var(--accent);}
.scoredet{font-size:9px;color:var(--muted);padding:1px 0 5px;font-family:var(--font-m);}
</style>
</head>
<body>

<div class="setup" id="setup">
  <h1>ROAD TO<br>NOWHERE</h1>
  <div class="sub">designed by st_arcturus</div>
  <div class="field">
    <label>Number of Players</label>
    <select id="s-players">
      <option value="3">3 Players</option>
      <option value="4">4 Players</option>
      <option value="5" selected>5 Players</option>
    </select>
  </div>
  <div class="field">
    <label>Start as Player</label>
    <select id="s-meplayer">
      <option value="0">Player 1</option>
      <option value="1">Player 2</option>
      <option value="2">Player 3</option>
      <option value="3">Player 4</option>
      <option value="4">Player 5</option>
    </select>
  </div>
  <button class="btn-start" onclick="startGame()">START GAME</button>
  <p class="note">Pass &amp; play prototype — use the header dropdown to switch between players during play.</p>
</div>

<div id="game">
  <header>
    <div class="title">ROAD TO NOWHERE</div>
    <div id="phase-badge" class="phase-badge">—</div>
    <div id="round-lbl" class="round-lbl"></div>
    <div class="switcher-wrap">
      Playing as:
      <select id="player-switcher"></select>
    </div>
  </header>
  <div class="main">
    <div class="lpanel">
      <div class="psec"><div class="plbl">Companies</div><div id="co-list"></div></div>
      <div class="psec"><div class="plbl">Turn Order</div><div id="ttrack" class="ttrack"></div></div>
      <div class="psec"><div class="plbl">Active Box</div><div id="abox" class="abox"></div></div>
      <div class="psec logarea" style="border-bottom:none;flex:1;">
        <div class="plbl">Log</div><div id="log"></div>
      </div>
    </div>
    <div class="cpanel"><svg id="map"></svg></div>
    <div class="rpanel">
      <div class="psec"><div class="plbl">Players</div><div id="pl-list"></div></div>
      <div class="actarea">
        <div class="actlbl">Your Actions</div>
        <div id="actmsg" class="actmsg"></div>
        <div id="actbtns"></div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tt"></div>
<div id="scorecard" class="scorecard" style="display:none">
  <div class="scorecard-header" id="scorecard-header">
    <div class="scoretitle">FINAL SCORES</div>
    <div class="score-btns">
      <button class="score-btn" id="score-minimize">—</button>
    </div>
  </div>
  <div class="scorecard-body">
    <div id="scorerows"></div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────
// color: CSS hex for rendering. key: internal string stored on company object.
// light: true = use dark text on badges (color is pale enough).
const COMPANY_DEFS=[
  {key:"hovering",color:"#56B4E9",name:"Hovering Highways",light:false},
  {key:"muddy",   color:"#CC79A7",name:"Muddy Machinery",  light:false},
  {key:"scuttle", color:"#BBBBBB",name:"Scuttle Surveyors",light:true},
  {key:"whooping",color:"#191919",name:"Whooping Workzone",light:false},
  {key:"buzzing", color:"#E69F00",name:"Buzzing Blacktop", light:true},
  {key:"coiled",  color:"#A8F1A4",name:"Coiled Construction",light:true},
];
const ROAD_TRACK_START=25;

const PLAYER_COLORS=["#0072B2","#D55E00","#9467BD","#DC267F","#44AA99"];
// Lightened versions for name badge backgrounds (mix color 30% into dark bg)
function playerBg(i){
  const c=PLAYER_COLORS[i]||"#888";
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  // Mix: 35% player color + 65% of --bg2 (#3c3c3c = 60,60,60)
  const br=Math.round(r*.35+60*.65),bg=Math.round(g*.35+60*.65),bb=Math.round(b*.35+60*.65);
  return`rgb(${br},${bg},${bb})`;
}

// Map definition. offset: global column index of the row's leftmost hex (0-based).
// Terrain columns are 0-based local indices (matching c in loops).
// playerRowSkip: how many rows from the top to hide for each player count.
const MAP={
  rows:[
    {offset:7,count:4, city:[],    river:[2],   mountain:[],   desert:[]},
    {offset:7,count:4, city:[0],   river:[2],   mountain:[],   desert:[]},
    {offset:5,count:6, city:[],    river:[3],   mountain:[],   desert:[5]},
    {offset:5,count:6, city:[],    river:[3],   mountain:[],   desert:[5]},
    {offset:4,count:7, city:[0],   river:[2,3], mountain:[],   desert:[5,6]},
    {offset:3,count:8, city:[],    river:[3],   mountain:[],   desert:[6,7]},
    {offset:2,count:9, city:[],    river:[3],   mountain:[],   desert:[6,7,8]},
    {offset:2,count:9, city:[],    river:[2,3], mountain:[],   desert:[6,7,8]},
    {offset:1,count:10,city:[],    river:[2],   mountain:[6],  desert:[7,8,9]},
    {offset:1,count:10,city:[3,9], river:[2],   mountain:[6],  desert:[7,8]},
    {offset:0,count:11,city:[],    river:[2],   mountain:[5,6],desert:[8,9,10]},
    {offset:1,count:10,city:[0],   river:[1],   mountain:[5],  desert:[7,8,9]},
    {offset:0,count:11,city:[],    river:[2],   mountain:[5],  desert:[7,8,9,10]},
    {offset:1,count:10,city:[3],   river:[2],   mountain:[4],  desert:[7,8,9]},
    {offset:0,count:11,city:[],    river:[2],   mountain:[5,6],desert:[7,8,9,10]},
    {offset:1,count:10,city:[9],   river:[2],   mountain:[5],  desert:[6,7,8]},
    {offset:0,count:11,city:[],    river:[3],   mountain:[6],  desert:[7,8,9,10]},
  ],
  playerRowSkip:{3:5,4:3,5:0},
};

const HEX_SIZE=26, HEX_W=Math.sqrt(3)*HEX_SIZE, HEX_H=2*HEX_SIZE;

function getTerrainForHex(r,c){
  const rd=MAP.rows[r];
  if(rd.city.includes(c))return"city";
  if(rd.river.includes(c))return"river";
  if(rd.mountain.includes(c))return"mountain";
  if(rd.desert.includes(c))return"desert";
  return"plain";
}

function hexCenter(r,c,skip){
  const rd=MAP.rows[r];
  const dr=(MAP.rows.length-1-skip)-r;
  const gc=c+rd.offset;
  const x=HEX_W*(gc+(r%2===1?-0.5:0))+HEX_W*0.5;
  const y=HEX_H*0.75*dr+HEX_SIZE;
  return[x,y];
}

// Takes skip (number of rows to omit from top) rather than player count,
// so it works with any map definition without hardcoding player counts.
function buildNbMap(skip){
  const maxR=MAP.rows.length-skip;
  const hexMap={};
  for(let r=0;r<maxR;r++)
    for(let c=0;c<MAP.rows[r].count;c++) hexMap[`${r}_${c}`]=true;
  const nb={};
  for(let r=0;r<maxR;r++){
    const rd=MAP.rows[r];
    for(let c=0;c<rd.count;c++){
      const id=`${r}_${c}`,gc=c+rd.offset,nbs=[];
      if(c>0)nbs.push(`${r}_${c-1}`);
      if(c<rd.count-1)nbs.push(`${r}_${c+1}`);
      const addNR=nr=>{
        if(nr<0||nr>=maxR)return;
        const nrd=MAP.rows[nr];
        for(const dg of(r%2===0?[0,1]:[-1,0])){
          const ngc=gc+dg,nc=ngc-nrd.offset;
          if(nc>=0&&nc<nrd.count){const nid=`${nr}_${nc}`;if(hexMap[nid])nbs.push(nid);}
        }
      };
      addNR(r-1);addNR(r+1);
      nb[id]=[...new Set(nbs)].filter(x=>hexMap[x]);
    }
  }
  return nb;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Game state ─────────────────────────────────────────────────────
let GAME=null, MY_PLAYER=0, NB_MAP={};

function setupGame(pc){
  const cc=pc+1, sc={3:25,4:30,5:35}[pc];
  const skip=MAP.playerRowSkip[pc]||0;
  const maxR=MAP.rows.length-skip;
  const hexState={};
  for(let r=0;r<maxR;r++)
    for(let c=0;c<MAP.rows[r].count;c++){
      const id=`${r}_${c}`;
      hexState[id]={terrain:getTerrainForHex(r,c),roads:[],disc:null};
    }
  const companies=[];
  for(let i=0;i<cc;i++)
    companies.push({key:COMPANY_DEFS[i].key,name:COMPANY_DEFS[i].name,roadTrack:ROAD_TRACK_START,treasury:0,active:true,
      builtInCity:[],lastRoad:null,claims:[],claimOwners:[],shares:[]});
  const players=[];
  for(let p=0;p<pc;p++) players.push({cash:sc,shares:[],discOnTrack:null,lastBid:null,claimsLeft:10});
  const initOrder=shuffle([...Array(pc).keys()]);
  const turnTrack=Array.from({length:pc},()=>({player:null,cube:null,bottomPlayer:null}));
  for(let i=0;i<pc;i++){turnTrack[i].player=initOrder[i];players[initOrder[i]].discOnTrack=i+1;}
  const firstShares=shuffle([...Array(cc).keys()]).slice(0,pc);
  for(let i=0;i<pc;i++){
    const p=initOrder[i],ci=firstShares[i];
    players[p].shares.push(ci);companies[ci].shares.push(p);
  }
  const revOrder=[...initOrder].reverse();
  NB_MAP=buildNbMap(skip);
  return {
    num_players:pc,round:1,phase:"initial_share_pick",
    active_player:revOrder[0],initial_share_pick_queue:revOrder.slice(1),
    players,companies,
    activeBox:[...Array(cc).keys()],
    turnTrack,hexState,
    bid:{currentBid:0,passed:[],active:[],bids:{}},
    buyShares:{pending:[]},
    buildRoads:{state:"draft",draftQueue:[],currentCompany:null,buildQueue:[],currentBuilder:null,buildPointsRemaining:0,roadsBuilt:0},
    claimLand:{pending:[]},
    log:[`Road to Nowhere – ${pc} players, ${cc} companies.`,`P${revOrder[0]+1}: pick your second share.`],
    finalScores:null,
  };
}

// ── Helpers ────────────────────────────────────────────────────────
function buildCost(t){return t==="mountain"?2:1;}
function turnOrder(G){return G.turnTrack.filter(s=>s.player!==null).map(s=>s.player);}
function activeCompanyIndices(G){return G.companies.map((_,i)=>i).filter(i=>G.companies[i].active);}

function canBuild(G,ci,hexId){
  const co=G.companies[ci],hs=G.hexState[hexId];
  if(!hs)return{ok:false};
  if(hs.terrain==="city"){if(hs.roads.includes(ci))return{ok:false,reason:"Already here"};}
  else{if(hs.roads.length>=1)return{ok:false,reason:"Hex full"};}
  if(co.lastRoad===null){
    if(hs.terrain!=="city")return{ok:false,reason:"First road must be in a city"};
  }else{
    if(!(NB_MAP[co.lastRoad]||[]).includes(hexId))return{ok:false,reason:"Not adjacent to last road"};
    // Must not be adjacent to any OTHER road of this company (only the last one)
    const otherNeighbors=(NB_MAP[hexId]||[]).filter(nid=>nid!==co.lastRoad&&G.hexState[nid]?.roads.includes(ci));
    if(otherNeighbors.length>0)return{ok:false,reason:"Adjacent to another road of same company"};
  }
  if(hs.terrain==="river"&&co.lastRoad!==null&&G.hexState[co.lastRoad]?.terrain==="river")
    return{ok:false,reason:"No consecutive rivers"};
  if(hs.terrain==="desert"&&co.treasury<1)return{ok:false,reason:"Needs $1"};
  if(co.roadTrack<=0)return{ok:false,reason:"Road track empty"};
  return{ok:true};
}

function hasAnyBuild(G,ci,bp){
  return Object.keys(G.hexState).some(hid=>{
    const r=canBuild(G,ci,hid);
    return r.ok&&buildCost(G.hexState[hid].terrain)<=bp;
  });
}

// DFS: ignores cube count & desert cost, respects hex capacity, river rule,
// and the no-adjacent-own-road constraint against both existing roads AND
// nodes already on the current path (hypothetically placed roads).
// BFS was insufficient: a path node placed earlier can block a later step
// that BFS missed because it only checked hexState, not the traversal path.
function canReachSecondCity(G,ci){
  const co=G.companies[ci];
  if(co.lastRoad===null)return true;
  const startT=G.hexState[co.lastRoad]?.terrain;
  const path=new Set([co.lastRoad]);
  function hasRoad(x){return G.hexState[x]?.roads.includes(ci)||path.has(x);}
  function dfs(hexId,lastWasRiver){
    for(const nid of(NB_MAP[hexId]||[])){
      const nhs=G.hexState[nid];if(!nhs)continue;
      const t=nhs.terrain;
      if(t==="city"){
        if(!co.builtInCity.includes(nid)){
          const cityBlocked=(NB_MAP[nid]||[]).some(x=>x!==hexId&&hasRoad(x));
          if(!cityBlocked)return true;
        }
        continue;
      }
      if(nhs.roads.length>=1)continue;
      if(t==="river"&&lastWasRiver)continue;
      if(path.has(nid))continue;
      if((NB_MAP[nid]||[]).some(x=>x!==hexId&&hasRoad(x)))continue;
      path.add(nid);
      if(dfs(nid,t==="river"))return true;
      path.delete(nid);
    }
    return false;
  }
  return dfs(co.lastRoad,startT==="river");
}

function deactivate(G,ci){
  const co=G.companies[ci];if(!co.active)return;
  co.active=false;addLog(G,`${co.name} becomes inactive!`);
  const i=G.activeBox.indexOf(ci);if(i!==-1)G.activeBox.splice(i,1);
  for(const s of G.turnTrack)if(s.cube===ci)s.cube=null;
}

function checkInactive(G,ci){
  const co=G.companies[ci];if(!co.active)return;
  if(co.builtInCity.length>=2){deactivate(G,ci);return;}
  if(co.roadTrack<=0){deactivate(G,ci);return;}
  if(!canReachSecondCity(G,ci)){deactivate(G,ci);return;}
}

// Check all active companies for inactivity — called after every road placement
// since blocking a hex can strand any company, not just the one currently building.
function checkAllInactive(G){
  for(let i=0;i<G.companies.length;i++) checkInactive(G,i);
}

function checkGameEnd(G){
  if(G.companies.filter(c=>c.active).length<2){G.phase="game_end";computeScores(G);return true;}
  return false;
}

function computeScores(G){
  addLog(G,"=== GAME OVER ===");
  const sv=ci=>Math.ceil((ROAD_TRACK_START-G.companies[ci].roadTrack)/2);
  const builtOnCount=pi=>{
    let n=0;
    for(let ci=0;ci<G.companies.length;ci++){
      const co=G.companies[ci];
      co.claimOwners.forEach((owner,idx)=>{
        if(owner===pi&&(G.hexState[co.claims[idx]]?.roads.length||0)>0)n++;
      });
    }
    return n;
  };
  const scores=G.players.map((p,pi)=>{
    const sh=p.shares.reduce((s,ci)=>s+sv(ci),0);
    let cl=0;
    for(let ci=0;ci<G.companies.length;ci++){
      const co=G.companies[ci];if(!co.claims.length)continue;
      const mine=co.claimOwners.filter(o=>o===pi).length;
      if(mine>0)cl+=Math.ceil(co.treasury/co.claims.length)*mine;
    }
    return{player:pi,cash:p.cash,shares:sh,claims:cl,total:p.cash+sh+cl};
  });
  scores.sort((a,b)=>{
    if(b.total!==a.total)return b.total-a.total;
    const as=G.players[a.player].shares.length,bs=G.players[b.player].shares.length;
    if(as!==bs)return as-bs;
    return builtOnCount(a.player)-builtOnCount(b.player);
  });
  G.finalScores=scores;
  for(const s of scores)addLog(G,`P${s.player+1}: $${s.total}`);
}

function addLog(G,msg){G.log.push(msg);if(G.log.length>200)G.log.splice(0,G.log.length-200);}

// ── Phase transitions ──────────────────────────────────────────────
function startBid(G){
  G.activeBox=activeCompanyIndices(G); // RESET
  const order=turnOrder(G); // capture BEFORE clearing top row
  // Move all players from top row to bottom row; clear cubes
  for(const s of G.turnTrack){s.bottomPlayer=s.player;s.player=null;s.cube=null;}
  G.phase="bid";
  G.bid={currentBid:0,passed:[],active:[...order],bids:{}};
  G.active_player=order[0];
  addLog(G,`--- Round ${G.round}: Bid ---`);
}

function startBuyShares(G){
  G.activeBox=activeCompanyIndices(G); // RESET
  for(const s of G.turnTrack){s.bottomPlayer=null;s.cube=null;}
  G.phase="buy_shares";
  const order=turnOrder(G);
  const eligible=order.filter(p=>(G.bid.bids[p]||0)>0);
  // Clear lastBid for players who won't get to buy
  for(const p of order)if(!eligible.includes(p))G.players[p].lastBid=null;
  G.buyShares={pending:[...eligible]};
  if(!eligible.length){startBuildRoads(G);return;}
  G.active_player=eligible[0];
  addLog(G,`--- Round ${G.round}: Buy Shares ---`);
}

function startBuildRoads(G){
  G.activeBox=activeCompanyIndices(G); // RESET
  for(const s of G.turnTrack){s.bottomPlayer=null;s.cube=null;}
  G.phase="build_roads";
  addLog(G,`--- Round ${G.round}: Build Roads ---`);
  const order=turnOrder(G);
  G.buildRoads={
    state:"draft",draftQueue:[...order],
    currentCompany:null,buildQueue:[],
    currentBuilder:null,buildPointsRemaining:0,roadsBuilt:0,
  };
  if(!G.activeBox.length||!order.length){startClaimLand(G);return;}
  G.active_player=order[0];
}

function advanceDraft(G){
  const br=G.buildRoads;
  br.currentCompany=null;br.currentBuilder=null;br.state="draft";
  br.draftQueue.shift();
  // Prune any companies that became inactive from activeBox
  G.activeBox=G.activeBox.filter(ci=>G.companies[ci].active);
  if(!br.draftQueue.length){
    // Check any remaining un-drafted companies for blockage
    for(const ci of[...G.activeBox])checkInactive(G,ci);
    startClaimLand(G);return;
  }
  if(!G.activeBox.length){startClaimLand(G);return;}
  G.active_player=br.draftQueue[0];
}

function nextBuilder(G){
  const br=G.buildRoads;
  if(!br.buildQueue.length){
    checkAllInactive(G);
    advanceDraft(G);return;
  }
  const ci=br.currentCompany;
  br.currentBuilder=br.buildQueue.shift();
  const bp=G.players[br.currentBuilder].shares.filter(s=>s===ci).length;
  br.buildPointsRemaining=bp;
  G.active_player=br.currentBuilder;
  addLog(G,`${G.companies[ci].name}: P${br.currentBuilder+1} (${bp} BP).`);
}

function hasValidClaim(G,player){
  if(G.players[player].claimsLeft<=0)return false;
  return Object.values(G.hexState).some(hs=>hs.terrain!=="city"&&hs.disc===null&&hs.roads.length===0);
}

function claimAdvance(G){
  while(G.claimLand.pending.length>0){
    const p=G.claimLand.pending[0];
    if(hasValidClaim(G,p))break;
    G.claimLand.pending.shift();
    const reason=G.players[p].claimsLeft<=0?'no claims remaining':'no valid hexes';
    addLog(G,`P${p+1} auto-skipped (${reason}).`);
  }
  if(!G.claimLand.pending.length){endRound(G);return;}
  G.active_player=G.claimLand.pending[0];
}

function startClaimLand(G){
  // 1. 7-share deactivation
  for(let ci=0;ci<G.companies.length;ci++){
    const co=G.companies[ci];
    if(co.active&&co.shares.length>=7){
      addLog(G,`${co.name} shut down — all shares issued.`);
      deactivate(G,ci);
    }
  }
  // 2. Game end: fewer than 2 active companies
  if(checkGameEnd(G))return;
  // 3. Game end: stalemate — no roads built this phase
  if(G.buildRoads.roadsBuilt===0){
    addLog(G,"No roads built this phase — game ends.");
    G.phase="game_end";computeScores(G);return;
  }
  G.phase="claim_land";
  const order=turnOrder(G);
  G.claimLand={pending:[...order]};
  addLog(G,`--- Round ${G.round}: Claim Land ---`);
  claimAdvance(G);
}

function endRound(G){G.round++;addLog(G,`=== Round ${G.round} ===`);startBid(G);}

// ── Actions ────────────────────────────────────────────────────────
function act(type,args){
  try{
    doAction(GAME,MY_PLAYER,type,args||{});
    if(GAME.phase!=="game_end"){
      MY_PLAYER=GAME.active_player;
      document.getElementById("player-switcher").value=MY_PLAYER;
      bidAmount=1;
    }
    render();
  }
  catch(e){alert(e.message);}
}

function doAction(G,player,type,args){
  if(G.phase==="initial_share_pick")doInitialPick(G,player,type,args);
  else if(G.phase==="bid")doBid(G,player,type,args);
  else if(G.phase==="buy_shares")doBuy(G,player,type,args);
  else if(G.phase==="build_roads")doBuildRoads(G,player,type,args);
  else if(G.phase==="claim_land")doClaim(G,player,type,args);
}

function doInitialPick(G,player,type,args){
  if(player!==G.active_player)throw new Error("Not your turn");
  const ci=args.company;
  if(!G.activeBox.includes(ci))throw new Error("Company not available");
  if(G.players[player].shares.includes(ci))throw new Error("Must pick a different company from your first");
  // Remove from active box (draft pool)
  G.activeBox.splice(G.activeBox.indexOf(ci),1);
  G.players[player].shares.push(ci);G.companies[ci].shares.push(player);
  // Show cube on this player's turn track slot
  const slot=G.turnTrack.find(s=>s.player===player);
  if(slot)slot.cube=ci;
  addLog(G,`P${player+1} picks ${G.companies[ci].name}.`);
  if(G.initial_share_pick_queue.length>0){
    G.active_player=G.initial_share_pick_queue.shift();
    addLog(G,`P${G.active_player+1}: pick your second share.`);
  }else{addLog(G,"All shares dealt!");startBid(G);}
}

function doBid(G,player,type,args){
  if(!G.bid.active.includes(player))throw new Error("Not in bid");
  if(type==="pass"){
    G.bid.active.splice(G.bid.active.indexOf(player),1);
    G.bid.passed.push(player);
    const slotIdx=G.turnTrack.length-G.bid.passed.length;
    if(slotIdx>=0){G.turnTrack[slotIdx].player=player;G.players[player].discOnTrack=slotIdx+1;}
    // Remove from bottom row
    for(const s of G.turnTrack)if(s.bottomPlayer===player)s.bottomPlayer=null;
    addLog(G,`P${player+1} passes.`);
    if(G.bid.active.length===1){
      const w=G.bid.active[0];
      G.turnTrack[0].player=w;G.players[w].discOnTrack=1;
      G.bid.bids[w]=G.bid.currentBid;G.bid.active=[];
      for(const s of G.turnTrack)s.bottomPlayer=null;
      addLog(G,`P${w+1} wins 1st at $${G.bid.currentBid}.`);
      startBuyShares(G);return;
    }
    G.active_player=G.bid.active[0];
  }else if(type==="raise"){
    if(player!==G.bid.active[0])throw new Error("Not your turn");
    const amount=args.amount;
    if(amount<=G.bid.currentBid)throw new Error(`Must bid > $${G.bid.currentBid}`);
    if(amount>G.players[player].cash)throw new Error("Not enough cash");
    G.bid.currentBid=amount;G.bid.bids[player]=amount;G.players[player].lastBid=amount;
    addLog(G,`P${player+1} bids $${amount}.`);
    G.bid.active.splice(G.bid.active.indexOf(player),1);
    G.bid.active.push(player);
    G.active_player=G.bid.active[0];
  }else throw new Error("Unknown bid action");
}

function doBuy(G,player,type,args){
  if(G.buyShares.pending[0]!==player)throw new Error("Not your turn");
  if(type!=="buy")throw new Error("Buying is mandatory");
  if(!G.activeBox.length)throw new Error("Active box empty");
  const ci=args.company;
  if(ci===undefined||!G.activeBox.includes(ci))throw new Error("Invalid company");
  const bidAmt=G.bid.bids[player]||0;
  const cost=G.players[player].discOnTrack===1?bidAmt:Math.ceil(bidAmt/2);
  if(G.players[player].cash<cost)throw new Error("Not enough cash");
  G.players[player].cash-=cost;G.companies[ci].treasury+=cost;
  G.players[player].shares.push(ci);G.companies[ci].shares.push(player);
  G.activeBox.splice(G.activeBox.indexOf(ci),1);
  G.buyShares.pending.shift();G.players[player].lastBid=null;
  addLog(G,`P${player+1} buys ${G.companies[ci].name} for $${cost}.`);
  if(!G.buyShares.pending.length||!G.activeBox.length){
    for(const p of G.buyShares.pending)G.players[p].lastBid=null;
    startBuildRoads(G);return;
  }
  G.active_player=G.buyShares.pending[0];
}

function doBuildRoads(G,player,type,args){
  const br=G.buildRoads;

  // ── Draft: pick a company ──────────────────────────────────────
  if(br.state==="draft"){
    if(player!==br.draftQueue[0])throw new Error("Not your turn to pick");
    if(type!=="pick_company")throw new Error("Must pick a company");
    const ci=args.company;
    if(!G.activeBox.includes(ci))throw new Error("Company not available");
    G.activeBox.splice(G.activeBox.indexOf(ci),1);
    addLog(G,`P${player+1} activates ${G.companies[ci].name}.`);
    checkInactive(G,ci);
    if(!G.companies[ci].active){advanceDraft(G);return;}
    const order=turnOrder(G);
    const idx=order.indexOf(player);
    const wrapped=[...order.slice(idx),...order.slice(0,idx)];
    const buildQueue=wrapped.filter(p=>G.players[p].shares.includes(ci));
    if(!buildQueue.length){
      // No shareholders this round — skip building, do not deactivate (temporary)
      addLog(G,`${G.companies[ci].name}: no shareholders, skipping build.`);
      advanceDraft(G);return;
    }
    br.currentCompany=ci;br.buildQueue=buildQueue;br.state="building";
    nextBuilder(G);return;
  }

  // ── Building ───────────────────────────────────────────────────
  if(player!==br.currentBuilder)throw new Error("Not your turn");
  const ci=br.currentCompany,co=G.companies[ci];
  if(type==="pass_build"){
    if(hasAnyBuild(G,ci,br.buildPointsRemaining))throw new Error("Must build — legal moves exist");
    addLog(G,`P${player+1} done building.`);nextBuilder(G);return;
  }
  if(type==="build"){
    const hexId=args.hex,hs=G.hexState[hexId];
    if(!hs)throw new Error("Invalid hex");
    const chk=canBuild(G,ci,hexId);if(!chk.ok)throw new Error(chk.reason);
    const cost=buildCost(hs.terrain);
    if(br.buildPointsRemaining<cost)throw new Error(`Need ${cost} BP`);
    if(hs.terrain==="desert")co.treasury-=1;
    hs.roads.push(ci);co.lastRoad=hexId;
    co.roadTrack=Math.max(0,co.roadTrack-1);
    br.buildPointsRemaining-=cost;
    if(hs.terrain==="city"&&!co.builtInCity.includes(hexId))co.builtInCity.push(hexId);
    if(hs.disc!==null){
      co.claims.push(hexId);co.claimOwners.push(hs.disc);
      addLog(G,`${co.name} builds on P${hs.disc+1}'s claim!`);hs.disc=null;
    }
    br.roadsBuilt++;
    addLog(G,`P${player+1} builds ${co.name} at ${hexId} (${hs.terrain}).`);
    checkAllInactive(G);
    if(!co.active){advanceDraft(G);return;}
    if(br.buildPointsRemaining===0||!hasAnyBuild(G,ci,br.buildPointsRemaining)){nextBuilder(G);return;}
    return;
  }
  throw new Error(`Unknown build action: ${type}`);
}

function doClaim(G,player,type,args){
  if(G.claimLand.pending[0]!==player)throw new Error("Not your turn");
  if(type==="claim"){
    const hexId=args.hex,hs=G.hexState[hexId];
    if(!hs)throw new Error("Invalid hex");
    if(hs.terrain==="city")throw new Error("Cannot claim a city");
    if(hs.disc!==null)throw new Error("Already claimed");
    if(hs.roads.length>0)throw new Error("Has a road");
    if(G.players[player].claimsLeft<=0)throw new Error("No claims left");
    hs.disc=player;G.players[player].claimsLeft--;
    G.claimLand.pending.shift();
    addLog(G,`P${player+1} claims ${hexId}.`);
  }else throw new Error("Must place a disc — claiming is mandatory");
  claimAdvance(G);
}

// ── Rendering ──────────────────────────────────────────────────────
const TFILL={plain:"#2a2820",river:"#192e3e",mountain:"#312e28",desert:"#362e18",city:"#3a3845"};
const TSTROKE={plain:"#383630",river:"#28465e",mountain:"#464038",desert:"#484030",city:"#6a6880"};
const TICONS={mountain:"▲",river:"≋",desert:"·"};
const TICOL={mountain:"#6a5f54",river:"#3e7898",desert:"#746c3a"};

function hexCorners(cx,cy,s){
  const pts=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push(`${(cx+s*Math.cos(a)).toFixed(1)},${(cy+s*Math.sin(a)).toFixed(1)}`);}
  return pts.join(" ");
}

function computeView(G,player){
  const br=G.buildRoads;
  const isActive=G.active_player===player;
  const actions=[];
  if(G.phase==="initial_share_pick"&&isActive){
    const held=G.players[player].shares;
    for(const ci of G.activeBox)
      if(!held.includes(ci))
        actions.push({type:"pick_share",company:ci});
  }
  if(G.phase==="bid"&&G.bid.active.includes(player)){
    actions.push({type:"pass"});
    actions.push({type:"raise"});
  }
  if(G.phase==="buy_shares"&&G.buyShares.pending[0]===player){
    for(const ci of G.activeBox)actions.push({type:"buy",company:ci});
  }
  if(G.phase==="build_roads"){
    if(br.state==="draft"&&br.draftQueue[0]===player){
      for(const ci of G.activeBox)actions.push({type:"pick_company",company:ci});
    }
    if(br.state==="building"&&br.currentBuilder===player){
      const ci=br.currentCompany,bp=br.buildPointsRemaining;
      if(ci!==null)
        for(const hexId of Object.keys(G.hexState)){
          const chk=canBuild(G,ci,hexId);
          if(chk.ok&&buildCost(G.hexState[hexId].terrain)<=bp)
            actions.push({type:"build",hex:hexId});
        }
      if(!hasAnyBuild(G,ci,bp))actions.push({type:"pass_build"});
    }
  }
  if(G.phase==="claim_land"&&G.claimLand.pending[0]===player){
    if(hasValidClaim(G,player))
      for(const[hexId,hs]of Object.entries(G.hexState))
        if(hs.terrain!=="city"&&hs.disc===null&&hs.roads.length===0)
          actions.push({type:"claim",hex:hexId});
  }
  return{...G,actions,myPlayer:player,is_active:isActive,
    buildRoads:{...br}};
}

function render(){
  if(!GAME)return;
  const skip=MAP.playerRowSkip[GAME.num_players]||0;
  const view=computeView(GAME,MY_PLAYER);
  const phases={initial_share_pick:"Initial Shares",bid:"Bid for Turn Order",
    buy_shares:"Buy Shares",
    build_roads:view.buildRoads.state==="draft"?"Build Roads — Draft":"Build Roads — Building",
    claim_land:"Claim Land",game_end:"Game Over"};
  document.getElementById("phase-badge").textContent=phases[view.phase]||view.phase;
  document.getElementById("round-lbl").textContent=`Round ${view.round}`;
  renderMap(view,skip);renderLeft(view);renderRight(view);
  if(view.finalScores)renderScores(view);
}

function renderMap(view,skip){
  const svg=document.getElementById("map");svg.innerHTML="";
  const maxR=MAP.rows.length-skip;
  const maxGc=Math.max(...MAP.rows.slice(0,maxR).map(rd=>rd.offset+rd.count-1));
  const svgW=HEX_W*(maxGc+1.5)+10;
  const svgH=HEX_H*0.75*(maxR-1)+HEX_H+10;
  svg.setAttribute("width",svgW);svg.setAttribute("height",svgH);
  const buildable=new Set(view.actions.filter(a=>a.type==="build").map(a=>a.hex));
  const claimable=new Set(view.actions.filter(a=>a.type==="claim").map(a=>a.hex));
  const ns="http://www.w3.org/2000/svg";
  for(let r=0;r<maxR;r++){
    const rd=MAP.rows[r];
    for(let c=0;c<rd.count;c++){
      const hexId=`${r}_${c}`,terrain=getTerrainForHex(r,c);
      const[cx,cy]=hexCenter(r,c,skip);
      const hs=view.hexState?.[hexId];
      const g=document.createElementNS(ns,"g");g.style.cursor="pointer";
      const poly=document.createElementNS(ns,"polygon");
      poly.setAttribute("points",hexCorners(cx,cy,HEX_SIZE-1));
      poly.setAttribute("fill",TFILL[terrain]);
      let sc="none",sw="0";
      if(buildable.has(hexId)){sc="#c8a84b";sw="2";}
      else if(claimable.has(hexId)){sc="#56B4E9";sw="1.8";}
      poly.setAttribute("stroke",sc);poly.setAttribute("stroke-width",sw);
      g.appendChild(poly);
      if(terrain==="city"){
        // Two skyscraper rects scaled to 90% of original, centered on (cx,cy).
        // b1: 12.6×25.2  b2: 14.4×18  0.9px overlap  total group: 26.1×25.2
        const bldCol="#aeacc3";
        const b1=document.createElementNS(ns,"rect");
        b1.setAttribute("x",(cx-13.1).toFixed(1));b1.setAttribute("y",(cy-12.6).toFixed(1));
        b1.setAttribute("width","12.6");b1.setAttribute("height","25.2");
        b1.setAttribute("rx","0");b1.setAttribute("fill",bldCol);b1.setAttribute("pointer-events","none");
        g.appendChild(b1);
        const b2=document.createElementNS(ns,"rect");
        b2.setAttribute("x",(cx-1.4).toFixed(1));b2.setAttribute("y",(cy-5.4).toFixed(1));
        b2.setAttribute("width","14.4");b2.setAttribute("height","18");
        b2.setAttribute("rx","0");b2.setAttribute("fill",bldCol);b2.setAttribute("pointer-events","none");
        g.appendChild(b2);
      } else if(terrain!=="plain"){
        const t=document.createElementNS(ns,"text");
        t.setAttribute("x",cx);t.setAttribute("y",cy+4);
        t.setAttribute("text-anchor","middle");t.setAttribute("font-size","11");
        t.setAttribute("fill",TICOL[terrain]);t.setAttribute("pointer-events","none");
        t.textContent=TICONS[terrain];g.appendChild(t);
      }
      if(hs?.roads?.length){
        const n=hs.roads.length;
        const S=12; // cube size (square)
        if(terrain==="city"&&n>1){
          // 2-row 3-col grid, max 6
          const cols=3,gap=2;
          const rows=Math.ceil(n/cols);
          const gridW=cols*S+(cols-1)*gap;
          const gridH=rows*S+(rows-1)*gap;
          const x0=cx-gridW/2, y0=cy-gridH/2;
          hs.roads.forEach((ci,i)=>{
            const col=i%cols, row=Math.floor(i/cols);
            const rect=document.createElementNS(ns,"rect");
            rect.setAttribute("x",(x0+col*(S+gap)).toFixed(1));
            rect.setAttribute("y",(y0+row*(S+gap)).toFixed(1));
            rect.setAttribute("width",S);rect.setAttribute("height",S);rect.setAttribute("rx","0");
            rect.setAttribute("fill",COMPANY_DEFS[ci]?.color||"#888");
            rect.setAttribute("pointer-events","none");g.appendChild(rect);
          });
        } else {
          // Single cube centered on hex
          const rect=document.createElementNS(ns,"rect");
          rect.setAttribute("x",(cx-S/2).toFixed(1));rect.setAttribute("y",(cy-S/2).toFixed(1));
          rect.setAttribute("width",S);rect.setAttribute("height",S);rect.setAttribute("rx","0");
          rect.setAttribute("fill",COMPANY_DEFS[hs.roads[0]]?.color||"#888");
          rect.setAttribute("pointer-events","none");g.appendChild(rect);
        }
      }
      if(hs?.disc!=null){
        // Claim disc: 2x size, centered, 50% translucent
        const disc=document.createElementNS(ns,"circle");
        disc.setAttribute("cx",cx);disc.setAttribute("cy",cy);disc.setAttribute("r","13");
        disc.setAttribute("fill",PLAYER_COLORS[hs.disc]||"#aaa");
        disc.setAttribute("fill-opacity","0.5");
        const discColor=PLAYER_COLORS[hs.disc]||"#aaa";
        disc.setAttribute("stroke",discColor);disc.setAttribute("stroke-width","1");
        disc.setAttribute("pointer-events","none");g.appendChild(disc);
      }
      if(buildable.has(hexId)||claimable.has(hexId)){
        const ring=document.createElementNS(ns,"polygon");
        ring.setAttribute("points",hexCorners(cx,cy,HEX_SIZE-3));
        ring.setAttribute("fill",buildable.has(hexId)?"rgba(200,168,75,0.12)":"rgba(86,180,233,0.12)");
        ring.setAttribute("pointer-events","none");g.appendChild(ring);
      }
      g.addEventListener("click",()=>onHexClick(hexId,view));
      g.addEventListener("mouseenter",e=>showTT(e,hexId,view,terrain,hs));
      g.addEventListener("mouseleave",()=>document.getElementById("tt").style.display="none");
      svg.appendChild(g);
    }
  }
}

function onHexClick(hexId,view){
  if(!view.is_active)return;
  if(view.phase==="build_roads"&&view.buildRoads.state==="building"&&view.actions.find(a=>a.type==="build"&&a.hex===hexId))
    act("build",{hex:hexId});
  else if(view.phase==="claim_land"&&view.actions.find(a=>a.type==="claim"&&a.hex===hexId))
    act("claim",{hex:hexId});
}

function showTT(e,hexId,view,terrain,hs){
  const tt=document.getElementById("tt");
  const parts=[terrain.toUpperCase()];
  if(terrain==="mountain")parts.push("Cost: 2 BP");
  if(terrain==="desert")parts.push("Cost: $1/hex");
  if(terrain==="river")parts.push("No consecutive");
  if(terrain==="city")parts.push("City");
  if(hs?.roads?.length)parts.push("Roads: "+hs.roads.map(ci=>view.companies[ci]?.name.split(" ")[0]).join(", "));
  if(hs?.disc!=null)parts.push(`P${hs.disc+1}'s claim`);
  tt.textContent=parts.join(" · ");tt.style.display="block";
  tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY+12)+"px";
}

function renderLeft(view){
  const cl=document.getElementById("co-list");cl.innerHTML="";
  view.companies.forEach((co,ci)=>{
    const sv=Math.ceil((ROAD_TRACK_START-co.roadTrack)/2);
    const sharesLeft=7-co.shares.length;
    const d=document.createElement("div");d.className="co-card"+(co.active?"":" inactive");
    d.innerHTML=`<div class="co-dot" style="background:${COMPANY_DEFS[ci].color}"></div>
      <div class="co-nm">${co.name.split(" ")[0]}</div>
      <div class="co-stats">
        <div class="co-primary">
          <span class="co-val" title="Share value">$${sv}/sh</span>
          <span class="co-treas" title="Treasury">$${co.treasury}</span>
          ${co.claimOwners&&co.claimOwners.length?`<span class="co-claimval" title="Current value per built-on claim">($${Math.ceil(co.treasury/co.claimOwners.length)}/claim)</span>`:''}
        </div>
        <div class="co-claims-row" id="co-claims-${ci}"></div>
        <div class="co-secondary">
          <span title="Shares not yet issued">${sharesLeft}/7 sh</span>
          <span title="Road cubes remaining">${co.roadTrack} cubes</span>
        </div>
      </div>`;
    cl.appendChild(d);
    // Render claim owner counters
    const claimsEl=document.getElementById(`co-claims-${ci}`);
    if(claimsEl&&co.claimOwners&&co.claimOwners.length){
      const claimCounts={};
      co.claimOwners.forEach(o=>{claimCounts[o]=(claimCounts[o]||0)+1;});
      Object.entries(claimCounts).forEach(([owner,count])=>{
        owner=parseInt(owner);
        const pip=document.createElement("div");pip.className="claim-counter";
        pip.style.background=PLAYER_COLORS[owner]||"#aaa";
        pip.style.color="#f0f0f0";
        pip.title=`Player ${owner+1}`;pip.textContent=count;
        claimsEl.appendChild(pip);
      });
    }
  });
  const tt=document.getElementById("ttrack");tt.innerHTML="";
  const suf=["st","nd","rd","th","th"];
  const pc=view.turnTrack.length;

  function makePlayerBadge(playerIdx){
    const span=document.createElement("div");span.className="tplayer-badge";
    const bg=playerBg(playerIdx);
    const border=PLAYER_COLORS[playerIdx]||"#888";
    span.style.background=bg;span.style.borderLeftColor=border;
    span.textContent=`P${playerIdx+1}`;span.title=`Player ${playerIdx+1}`;
    return span;
  }

  // Top row: player positions (finalized turn order)
  const topRow=document.createElement("div");topRow.className="ttrack-row";
  view.turnTrack.forEach((slot,i)=>{
    const d=document.createElement("div");
    d.className="tslot"+(slot.player==null?" empty":"");
    const pos=document.createElement("div");pos.className="tpos";
    pos.textContent=`${i+1}${suf[i]||""}`;d.appendChild(pos);
    if(slot.player!=null)d.appendChild(makePlayerBadge(slot.player));
    topRow.appendChild(d);
  });

  // Bottom row: bottomPlayer (during bid) or cube (buy/build/initial)
  const botRow=document.createElement("div");botRow.className="ttrack-row";
  view.turnTrack.forEach((slot,i)=>{
    const d=document.createElement("div");
    const hasBotPlayer=slot.bottomPlayer!=null;
    const hasCube=slot.cube!=null;
    d.className="tslot"+(!hasBotPlayer&&!hasCube?" empty":"");
    if(hasBotPlayer){
      d.appendChild(makePlayerBadge(slot.bottomPlayer));
    } else if(hasCube){
      const cube=document.createElement("div");cube.className="tcube-bot";
      cube.style.background=COMPANY_DEFS[slot.cube]?.color||"#888";
      cube.title=view.companies[slot.cube]?.name;d.appendChild(cube);
    }
    botRow.appendChild(d);
  });

  tt.appendChild(topRow);tt.appendChild(botRow);
  const ab=document.getElementById("abox");ab.innerHTML="";
  if(!view.activeBox?.length){ab.innerHTML='<span style="color:var(--muted);font-size:9px">empty</span>';return;}
  view.activeBox.forEach(ci=>{
    const cube=document.createElement("div");cube.className="acube";
    cube.style.background=COMPANY_DEFS[ci]?.color||"#888";
    cube.title=view.companies[ci]?.name;ab.appendChild(cube);
  });
  const log=document.getElementById("log");log.innerHTML="";
  (view.log||[]).slice(-30).forEach((e,i,arr)=>{
    const d=document.createElement("div");
    d.className="logentry"+(i===arr.length-1?" hi":"");
    d.textContent=e;log.appendChild(d);
  });
  log.scrollTop=log.scrollHeight;
}

function renderRight(view){
  const pl=document.getElementById("pl-list");pl.innerHTML="";
  const sorted=[...view.players.map((p,i)=>({...p,i}))].sort((a,b)=>(a.discOnTrack||99)-(b.discOnTrack||99));
  for(const p of sorted){
    const isActive=p.i===view.active_player;
    const d=document.createElement("div");d.className="plcard";
    const bg=playerBg(p.i);
    const border=PLAYER_COLORS[p.i]||"#888";
    d.innerHTML=`<div class="plhdr">
      <div class="plpos">${p.discOnTrack?p.discOnTrack+".":"—"}</div>
      ${isActive?'<div class="pldot"></div>':""}
      <div class="plnm" style="background:${bg};border-left:2px solid ${border};padding:1px 5px;border-radius:2px;" title="Player ${p.i+1}">P${p.i+1}${p.i===MY_PLAYER?" (you)":""}</div>
      <div class="plcash">$${p.cash}</div>
      ${p.lastBid?`<div class="pl-bid" title="Last bid">bid $${p.lastBid}</div>`:''}
    </div>
    <div class="pl-meta">
      <span class="pl-claims" title="Claim discs remaining">${p.claimsLeft}/10 claims</span>
    </div>
    <div class="pips" id="pips-${p.i}"></div>`;
    pl.appendChild(d);
    const pips=document.getElementById(`pips-${p.i}`);
    const shareCounts={};
    p.shares.forEach(ci=>{shareCounts[ci]=(shareCounts[ci]||0)+1;});
    Object.entries(shareCounts).forEach(([ci,count])=>{
      ci=parseInt(ci);
      const co=view.companies[ci];
      const pip=document.createElement("div");pip.className="pip-counter";
      pip.style.background=COMPANY_DEFS[ci]?.color||"#888";
      pip.style.color=COMPANY_DEFS[ci]?.light?"#111":"#f0f0f0";
      pip.title=co?.name;pip.textContent=count;pips.appendChild(pip);
    });
  }
  renderActions(view);
}

let bidAmount=1;

function renderActions(view){
  const msgEl=document.getElementById("actmsg");
  const btnEl=document.getElementById("actbtns");
  btnEl.innerHTML="";
  if(!view.is_active){
    msgEl.textContent=`Waiting for Player ${view.active_player+1}…`;return;
  }
  const br=view.buildRoads;
  const msgs={
    initial_share_pick:"Pick your second share — must differ from your first.",
    bid:"Raise the bid to claim 1st position, or pass.",
    buy_shares:"Pick a share from the active box. Buying is mandatory.",
    build_roads:br.state==="draft"
      ?`Pick a company to activate. You will build first.`
      :`Building ${view.companies[br.currentCompany]?.name||""}. ${br.buildPointsRemaining||0} BP left.`,
    claim_land:"Click any highlighted hex to place your claim disc. Claiming is mandatory.",
    game_end:"Game over!",
  };
  msgEl.textContent=msgs[view.phase]||"";

  if(view.phase==="initial_share_pick"){
    view.actions.forEach(a=>{
      const ci=a.company;
      const btn=document.createElement("button");btn.className="btn primary";
      btn.innerHTML=`<span style="display:inline-block;width:10px;height:10px;background:${COMPANY_DEFS[ci].color};margin-right:6px;vertical-align:middle"></span>${view.companies[ci].name}`;
      btn.onclick=()=>act("pick_share",{company:ci});btnEl.appendChild(btn);
    });
  }

  if(view.phase==="bid"){
    const minBid=view.bid.currentBid+1;
    const maxBid=view.players[MY_PLAYER].cash;
    if(bidAmount<minBid)bidAmount=minBid;
    if(bidAmount>maxBid)bidAmount=maxBid;
    const widget=document.createElement("div");widget.className="bid-widget";
    const hint=document.createElement("div");hint.className="bid-hint";
    hint.textContent=`Winning bid: $${view.bid.currentBid} · Your cash: $${view.players[MY_PLAYER].cash}`;
    widget.appendChild(hint);
    const row=document.createElement("div");row.className="bid-row";
    const counter=document.createElement("div");counter.className="bid-counter";
    const btnMinus=document.createElement("button");btnMinus.textContent="−";
    btnMinus.disabled=bidAmount<=minBid;
    btnMinus.onclick=()=>{bidAmount=Math.max(minBid,bidAmount-1);renderActions(view);};
    const valSpan=document.createElement("span");valSpan.className="bid-val";valSpan.textContent=`$${bidAmount}`;
    const btnPlus=document.createElement("button");btnPlus.textContent="+";
    btnPlus.disabled=bidAmount>=maxBid;
    btnPlus.onclick=()=>{bidAmount=Math.min(maxBid,bidAmount+1);renderActions(view);};
    counter.appendChild(btnMinus);counter.appendChild(valSpan);counter.appendChild(btnPlus);
    row.appendChild(counter);
    const bidBtn=document.createElement("button");
    bidBtn.className="btn primary";bidBtn.style.flex="1";bidBtn.style.marginBottom="0";
    bidBtn.textContent=`Bid $${bidAmount}`;
    bidBtn.disabled=bidAmount>maxBid||bidAmount<=view.bid.currentBid;
    bidBtn.onclick=()=>act("raise",{amount:bidAmount});
    row.appendChild(bidBtn);widget.appendChild(row);
    const passBtn=document.createElement("button");passBtn.className="btn danger";passBtn.textContent="Pass";
    passBtn.onclick=()=>act("pass",{});widget.appendChild(passBtn);
    btnEl.appendChild(widget);
  }

  if(view.phase==="buy_shares"){
    const bidAmt=view.bid.bids?.[MY_PLAYER]||0;
    const is1st=view.players[MY_PLAYER].discOnTrack===1;
    const cost=is1st?bidAmt:Math.ceil(bidAmt/2);
    const hint=document.createElement("div");hint.className="bid-hint";hint.style.marginBottom="6px";
    hint.textContent=`Bid $${bidAmt} → pay $${cost}${is1st?" (1st, full)":"(half, rounded up)"}`;
    btnEl.appendChild(hint);
    const grid=document.createElement("div");grid.className="buy-grid";
    view.activeBox.forEach(ci=>{
      const btn=document.createElement("button");btn.className="btn buy-btn primary";
      btn.innerHTML=`<div class="buy-dot" style="background:${COMPANY_DEFS[ci].color}"></div>${view.companies[ci].name}`;
      btn.onclick=()=>act("buy",{company:ci});grid.appendChild(btn);
    });
    if(!view.activeBox.length){
      const msg=document.createElement("div");msg.className="bid-hint";msg.textContent="Active box empty.";
      btnEl.appendChild(msg);
    }
    btnEl.appendChild(grid);
  }

  if(view.phase==="build_roads"){
    if(br.state==="draft"){
      // Company draft picker
      const grid=document.createElement("div");grid.className="draft-grid";
      view.activeBox.forEach(ci=>{
        const co=view.companies[ci];
        const btn=document.createElement("button");btn.className="btn draft-btn primary";
        btn.innerHTML=`<div class="draft-dot" style="background:${COMPANY_DEFS[ci].color}"></div>${co.name}`;
        btn.onclick=()=>act("pick_company",{company:ci});grid.appendChild(btn);
      });
      btnEl.appendChild(grid);
    } else {
      // Building
      const buildCount=view.actions.filter(a=>a.type==="build").length;
      const hasPass=view.actions.some(a=>a.type==="pass_build");
      if(buildCount>0){
        const hint=document.createElement("div");hint.className="maphint";
        hint.textContent=`${buildCount} valid hex${buildCount>1?"es":""} highlighted — click map to build`;
        btnEl.appendChild(hint);
      }
      if(hasPass){
        const passBtn=document.createElement("button");passBtn.className="btn danger";
        passBtn.textContent="Done Building (no legal moves)";
        passBtn.onclick=()=>act("pass_build",{});btnEl.appendChild(passBtn);
      }
    }
  }

  if(view.phase==="claim_land"){
    const claimCount=view.actions.filter(a=>a.type==="claim").length;
    if(claimCount>0){
      const hint=document.createElement("div");hint.className="maphint";
      hint.textContent=`${claimCount} hex${claimCount>1?"es":""} available — click map to claim`;
      btnEl.appendChild(hint);
    }
    if(claimCount===0){
      const msg=document.createElement("div");msg.className="bid-hint";
      msg.textContent="No valid hexes to claim.";btnEl.appendChild(msg);
    }
  }
}

function renderScores(view){
  const card=document.getElementById("scorecard");
  card.style.display="block";
  // Wire minimize button once
  if(!card._wired){
    card._wired=true;
    document.getElementById("score-minimize").addEventListener("click",()=>{
      card.classList.toggle("minimized");
      document.getElementById("score-minimize").textContent=card.classList.contains("minimized")?"□":"—";
    });
    // Draggable
    const hdr=document.getElementById("scorecard-header");
    let dx=0,dy=0,mx=0,my=0;
    hdr.addEventListener("mousedown",e=>{
      mx=e.clientX;my=e.clientY;
      const r=card.getBoundingClientRect();
      // Switch to fixed position from bottom/right to top/left for drag
      card.style.top=r.top+"px";card.style.left=r.left+"px";
      card.style.bottom="auto";card.style.right="auto";
      function onMove(e){
        dx=e.clientX-mx;dy=e.clientY-my;mx=e.clientX;my=e.clientY;
        card.style.top=(card.offsetTop+dy)+"px";
        card.style.left=(card.offsetLeft+dx)+"px";
      }
      function onUp(){document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);}
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    });
  }
  const rows=document.getElementById("scorerows");rows.innerHTML="";
  view.finalScores.forEach((s,i)=>{
    const d=document.createElement("div");d.className="scorerow"+(i===0?" winner":"");
    d.innerHTML=`<span>P${s.player+1}${i===0?" 🏆":""}</span><span>$${s.total}</span>`;
    rows.appendChild(d);
    const det=document.createElement("div");det.className="scoredet";
    det.textContent=`cash $${s.cash}  +  shares $${s.shares}  +  claims $${s.claims}`;
    rows.appendChild(det);
  });
}

// ── Bootstrap ──────────────────────────────────────────────────────
document.getElementById("s-players").addEventListener("change",function(){
  const pc=parseInt(this.value);
  const sel=document.getElementById("s-meplayer");
  sel.innerHTML=Array.from({length:pc},(_,i)=>`<option value="${i}">Player ${i+1}</option>`).join("");
});

document.getElementById("player-switcher").addEventListener("change",function(){
  MY_PLAYER=parseInt(this.value);bidAmount=1;render();
});

function startGame(){
  const pc=parseInt(document.getElementById("s-players").value);
  MY_PLAYER=parseInt(document.getElementById("s-meplayer").value);
  if(MY_PLAYER>=pc)MY_PLAYER=0;
  const sw=document.getElementById("player-switcher");
  sw.innerHTML=Array.from({length:pc},(_,i)=>`<option value="${i}">Player ${i+1}</option>`).join("");
  sw.value=MY_PLAYER;
  GAME=setupGame(pc);bidAmount=1;
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="flex";
  render();
}
</script>
