<style>
.map_info { display: none }
.map_info.show { display: block }
</style>

<div class="map_info" id="map_info_Gold">
<p><i>Balanced map recommended for first time players.</i>
</div>

<div class="map_info" id="map_info_Granite">
<p><i>WIP for testing purposes only. Do not play.</i>
</div>

<p>
Player count:
<br>
<select name="players">
<option value="">5 Player</option>
<option value="4">4 Player</option>
<option value="3">3 Player</option>
</select>
</p>

<p>
<label>
<input type="checkbox" name="Subsidies_variant" value="true">
Subsidies variant
</label>
</p>

<script>
let map_select = document.querySelector("select[name='scenario']")
map_select.onchange = function () {
	document.querySelectorAll(".map_info").forEach(e => e.classList.remove("show"))
	document.getElementById("map_info_" + map_select.value).classList.add("show")
}
map_select.onchange()
</script>
